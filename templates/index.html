      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f6f8fa;
      color: #222;
    }
    .card {
      background: #fff;
      border: 1px solid #d0d7de;

      padding: 40px 48px;
      text-align: center;
      max-width: 360px;
      width: 100%;

    p { margin: 0 0 28px; color: #666; font-size: 14px; line-height: 1.5; }
    a.login-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #24292f;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    a.login-btn:hover { background: #32383f; }
    a.login-btn svg { flex-shrink: 0; }
  </style>
